{{define "title"}}Sites — Repair Jobs System{{end}}
{{define "content"}}
<main class="content">
    <div class="page-header">
        <h1 class="page-title">Sites</h1>
    </div>
    <hr class="divider">
    <div class="section-header">
        <a href="/sites/new" class="action-link">Add Site</a>
    </div>
    <table class="data-table">
        <thead>
            <tr>
                <th>Name ⇅</th>
                <th>Address ⇅</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {{range .Sites}}
            <tr>
                <td>{{.Name}}</td>
                <td>{{.Address}}</td>
                <td><a href="/sites/{{.ID}}" class="action-link">View</a></td>
            </tr>
            {{else}}
            <tr>
                <td colspan="3" class="empty-state">No sites added yet</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</main>
{{end}}
