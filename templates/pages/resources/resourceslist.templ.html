{{define "title"}}Resources — Repair Jobs System{{end}}
{{define "content"}}
<main class="content">
    <div class="page-header">
        <h1 class="page-title">Resources</h1>
    </div>
    <hr class="divider">
    <div class="section-header">
        <a href="/resources/new" class="action-link">Add Resource</a>
    </div>
    <table class="data-table">
        <thead>
            <tr>
                <th>Name </th>
                <th>Type </th>
                <th>Rate </th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {{range .Resources}}
            <tr>
                <td>{{.Name}}</td>
                <td>{{.ResourceType}}</td>
                <td>{{if .CurrentRate}}{{.CurrentRate.Rate}}{{else}}-{{end}}</td>
                <td><a href="/resources/{{.ID}}" class="action-link">View</a></td>
            </tr>
            {{else}}
            <tr>
                <td colspan="4" class="empty-state">No resources added yet</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</main>
{{end}}
