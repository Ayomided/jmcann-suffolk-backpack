name: Deply Backpack App

on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "main"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          go-version-file: "go.mod"
          check-latest: false
          cache: true
          cache-dependency-path: "go.sum"

      - name: Run tests
        run: go test ./...

  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "main"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          go-version-file: "go.mod"
          check-latest: false
          cache: true
          cache-dependency-path: "go.sum"

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o backpack-app ./cmd/backend/main.go

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync binary and assets
        run: |
          rsync -avz --delete \
            backpack-app \
            .github/scripts/deploy.sh \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/backpack/
          rsync -avz --delete \
            templates/ \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/backpack/templates/
          rsync -avz --delete \
            static/ \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/backpack/static/

      - name: Run deploy script
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "chmod +x /opt/backpack/deploy.sh && /opt/backpack/deploy.sh"

      - name: Notify success
        if: success()
        run: |
          echo "Deployment successful — https://backpack.adediiji.uk"

      - name: Notify failure
        if: failure()
        run: |
          echo "Deployment failed — app may be down"
          exit 1
